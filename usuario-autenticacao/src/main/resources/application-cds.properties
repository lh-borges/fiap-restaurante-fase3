# Profile usado SOMENTE durante o training de AppCDS no docker build.
# Objetivo: subir o contexto Spring por alguns milissegundos para que
# o JVM (-XX:ArchiveClassesAtExit) capture as classes carregadas.
# Nenhuma infra externa (MySQL/Kafka/gRPC) deve ser exigida.

# H2 in-memory para evitar dependencia de MySQL durante o build.
spring.datasource.url=jdbc:h2:mem:cdsdb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Tudo em porta efemera (0 = SO escolhe livre).
server.port=0
grpc.server.port=0

# DevTools fora durante training (gera classpath strange).
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
