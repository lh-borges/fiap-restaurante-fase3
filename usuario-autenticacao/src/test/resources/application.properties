# Test overrides
grpc.server.port=0
spring.jpa.show-sql=false

# JWT keys (same files used for tests)
spring.security.oauth2.resourceserver.jwt.public-key-location=classpath:keys/publicKey.pem
app.jwt.private-key-location=classpath:keys/privateKey.pem

# H2 in-memory datasource for tests
spring.datasource.url=jdbc:h2:mem:usuarioautenticacao-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
