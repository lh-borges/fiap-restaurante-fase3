# Test profile em H2 in-memory + Kafka embarcado via @EmbeddedKafka

spring.datasource.url=jdbc:h2:mem:pagamento_test;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

spring.security.oauth2.resourceserver.jwt.public-key-location=classpath:keys/publicKey.pem

# Kafka usa brokers iniciados pelo @EmbeddedKafka
spring.kafka.bootstrap-servers=${spring.embedded.kafka.brokers}
spring.kafka.consumer.group-id=pagamento-service-test

# Worker desativado nos testes (initial delay alto)
pagamento.reprocess.initial-delay-ms=600000
pagamento.reprocess.fixed-delay-ms=600000
pagamento.reprocess.batch-size=10

# Gateway sem chamadas reais nos testes
pagamento.gateway.url=http://localhost:1
pagamento.gateway.path=/requisicao
pagamento.gateway.connect-timeout-ms=200
pagamento.gateway.read-timeout-ms=200

# Topicos
pagamento.topics.pedido-criado=pedido.criado
pagamento.topics.pagamento-aprovado=pagamento.aprovado
pagamento.topics.pagamento-pendente=pagamento.pendente
