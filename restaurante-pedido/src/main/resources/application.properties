spring.application.name=restaurante-pedido
server.port=8081

# GraphQL
spring.graphql.graphiql.enabled=true
spring.graphql.path=/graphql

# JWT — chave pública do serviço usuario-autenticacao para validar tokens
spring.security.oauth2.resourceserver.jwt.public-key-location=classpath:keys/publicKey.pem
# JWT chave privada
app.jwt.private-key-location=classpath:keys/privateKey.pem

# gRPC
grpc.usuario.host=localhost
grpc.usuario.port=9000



# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/restaurante_pedido?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect