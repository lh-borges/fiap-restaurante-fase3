spring.application.name=restaurante-pedido
server.port=${SERVER_PORT:8082}

# GraphQL
spring.graphql.graphiql.enabled=true
spring.graphql.http.path=/graphql

# JWT � a chave publica de usuario-autenticacao para validar tokens
spring.security.oauth2.resourceserver.jwt.public-key-location=classpath:keys/publicKey.pem

# Datasource (MySQL) — defaults para execução local; container sobrescreve via env
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/pedido_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Kafka
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=restaurante-pedido-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=java.util.HashMap
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Topicos Kafka
pedido.topics.pedido-criado=pedido.criado
pedido.topics.pagamento-aprovado=pagamento.aprovado
pedido.topics.pagamento-pendente=pagamento.pendente

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always