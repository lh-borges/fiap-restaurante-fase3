# Profile usado SOMENTE durante o training de AppCDS no docker build.
# Sobe o contexto sem exigir MySQL/Kafka externos.

# H2 in-memory no lugar do MySQL.
spring.datasource.url=jdbc:h2:mem:cdsdb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Kafka: desliga listeners (nao tenta conectar em broker inexistente no build).
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.listener.auto-startup=false
spring.kafka.consumer.auto-startup=false

# Servidor web em porta efemera (o processo encerra em onRefresh).
server.port=0
