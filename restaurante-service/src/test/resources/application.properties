# Test profile - H2 em memoria + Kafka embarcado via @EmbeddedKafka

spring.datasource.url=jdbc:h2:mem:cozinha_test;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

spring.security.oauth2.resourceserver.jwt.public-key-location=classpath:keys/publicKey.pem

# Kafka - usa brokers iniciados pelo @EmbeddedKafka
spring.kafka.bootstrap-servers=${spring.embedded.kafka.brokers}
spring.kafka.consumer.group-id=restaurante-service-test
spring.kafka.consumer.auto-offset-reset=earliest

# Topicos
cozinha.topics.pedido-pronto-para-cozinha=pedido.pronto-para-cozinha
cozinha.topics.pedido-em-preparo=pedido.em-preparo
cozinha.topics.pedido-pronto=pedido.pronto
