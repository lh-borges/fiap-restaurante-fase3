# Sobe todo o sistema (4 apps + procpag + MySQL + Kafka KRaft + Kafka UI = 8 containers)
# com um único comando:
#
#     docker compose up -d --build
#
# Footprint (limits totais):
#  - 4 apps Spring  4 x 512M  = 2.0 GB
#  - MySQL                    = 512 MB
#  - Kafka                    = 512 MB
#  - Kafka UI                 = 256 MB
#  - procpag                  = 256 MB
#  - TOTAL                    ~ 3.5 GB (era ~5.7 GB antes do tuning de memoria)
#
# Foco em performance + footprint enxuto:
#  - Kafka em modo KRaft (sem Zookeeper): -1 container, startup ~10s mais rapido
#  - MySQL com innodb_buffer_pool_size, skip-name-resolve e performance_schema OFF
#  - Resource limits agressivos (memoria + CPU) para nao matar o host
#  - JVM com Xms64M + MaxRAMPercentage=65 + MaxMetaspaceSize=160M
#  - Healthchecks nos apps Spring com start_period (depends_on cascateia direito)
#  - tmpfs em /tmp dos apps (Spring escreve muito em /tmp no boot)
#  - Logging driver com rotacao (json-file ilimitado mata disco no longo prazo)
#  - JVM tunada via JAVA_TOOL_OPTIONS (override sem rebuild)
#  - init: true para SIGTERM chegar no java (shutdown gracioso, sem esperar 10s)

x-app-logging: &app-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-app-jvm-opts: &app-jvm-opts
  # Footprint minimo para dev/demo. Apps Spring Boot em 512M de container:
  #  - Xms64M: heap inicial baixo (cresce sob demanda)
  #  - MaxRAMPercentage=65: heap maximo ~330M (deixa 180M para metaspace + threads + native)
  #  - MaxMetaspaceSize=160M: limita metaspace (Spring tende a crescer com Hibernate)
  #  - G1GC: melhor coletor para heap pequeno e steady state
  #  - UseStringDeduplication: economiza heap em apps com muito DTO/JSON
  #  - ExitOnOutOfMemoryError: compose reinicia em OOM em vez de zumbi
  JAVA_TOOL_OPTIONS: >-
    -XX:+UseContainerSupport
    -XX:MaxRAMPercentage=65.0
    -XX:MaxMetaspaceSize=160M
    -Xms64M
    -XX:+UseG1GC
    -XX:+UseStringDeduplication
    -XX:+ExitOnOutOfMemoryError
    -Djava.security.egd=file:/dev/./urandom
    -Dspring.jmx.enabled=false
    -Dspring.backgroundpreinitializer.ignore=true

services:

  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      # Desabilita o teste de senha durante init para acelerar
      MYSQL_INITDB_SKIP_TZINFO: "1"
    command:
      # caching_sha2_password ja eh o default no MySQL 8.4; a flag --default-authentication-plugin
      # foi removida nessa versao. innodb-redo-log-capacity substitui innodb-log-file-size.
      # Tuning enxuto para dev: buffer pool 192M (suficiente para 4 schemas pequenos),
      # max-connections 60 (4 apps x 10 Hikari + overhead).
      - "--skip-name-resolve"                       # elimina reverse-DNS por conexao
      - "--innodb-buffer-pool-size=192M"            # era 512M
      - "--innodb-redo-log-capacity=64M"            # era 128M
      - "--innodb-flush-log-at-trx-commit=2"        # mais rapido (perde <=1s em crash do host)
      - "--innodb-flush-method=O_DIRECT"            # evita double-buffering com page cache
      - "--max-connections=60"                      # era 200
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
      - "--performance-schema=OFF"                  # desliga schema de telemetria (~80M)
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging: *app-logging
    deploy:
      resources:
        limits:
          memory: 512M           # era 1G
          cpus: "1.0"
        reservations:
          memory: 128M           # era 384M
    networks:
      - fase3net

  # Kafka em modo KRaft (sem Zookeeper). Single-node, otimo para dev/demo.
  # Imagem confluentinc 7.7 ja suporta KRaft de forma estavel e mantem o
  # binario `cub` para o healthcheck.
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      # --- KRaft (substitui zookeeper) ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      # --- Tuning para single-node (sem ISR) ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0   # consumers nao esperam 3s no startup
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      # --- JVM do broker ---
      KAFKA_HEAP_OPTS: "-Xms256M -Xmx256M"   # era 512M; suficiente para single-node dev
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 20 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    logging: *app-logging
    deploy:
      resources:
        limits:
          memory: 512M           # era 1G
          cpus: "1.0"
        reservations:
          memory: 192M           # era 512M
    networks:
      - fase3net

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      # Reduz consumo do proprio UI
      JAVA_OPTS: "-Xmx128M"      # era 256M
    logging: *app-logging
    deploy:
      resources:
        limits:
          memory: 256M           # era 384M
          cpus: "0.5"
    networks:
      - fase3net

  procpag:
    image: docker.io/erickemprobr/procpag:latest
    platform: linux/amd64
    container_name: procpag
    restart: unless-stopped
    ports:
      - "8089:8089"
    logging: *app-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - fase3net

  usuario-autenticacao:
    build:
      context: .
      dockerfile: usuario-autenticacao/Dockerfile
    image: fiap-fase3/usuario-autenticacao:local
    container_name: usuario-autenticacao
    restart: unless-stopped
    init: true
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      <<: *app-jvm-opts
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/auth_db?useSSL=false&allowPublicKeyRetrieval=true&cachePrepStmts=true&useServerPrepStmts=true&rewriteBatchedStatements=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 10
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 2
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      SPRING_JPA_OPEN_IN_VIEW: "false"
    tmpfs:
      - /tmp:size=128M
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    logging: *app-logging
    deploy:
      resources:
        limits:
          memory: 512M           # era 768M (cabe JVM com Xmx ~330M + metaspace 160M + threads)
          cpus: "0.75"
        reservations:
          memory: 128M           # era 384M
    networks:
      - fase3net

  restaurante-pedido:
    build:
      context: .
      dockerfile: restaurante-pedido/Dockerfile
    image: fiap-fase3/restaurante-pedido:local
    container_name: restaurante-pedido
    restart: unless-stopped
    init: true
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      usuario-autenticacao:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      <<: *app-jvm-opts
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/pedido_db?useSSL=false&allowPublicKeyRetrieval=true&cachePrepStmts=true&useServerPrepStmts=true&rewriteBatchedStatements=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 10
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 2
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      SPRING_JPA_OPEN_IN_VIEW: "false"
    tmpfs:
      - /tmp:size=128M
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    logging: *app-logging
    deploy:
      resources:
        limits:
          memory: 512M           # era 768M (cabe JVM com Xmx ~330M + metaspace 160M + threads)
          cpus: "0.75"
        reservations:
          memory: 128M           # era 384M
    networks:
      - fase3net

  pagamento-service:
    build:
      context: .
      dockerfile: pagamento-service/Dockerfile
    image: fiap-fase3/pagamento-service:local
    container_name: pagamento-service
    restart: unless-stopped
    init: true
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      <<: *app-jvm-opts
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/pagamento_db?useSSL=false&allowPublicKeyRetrieval=true&cachePrepStmts=true&useServerPrepStmts=true&rewriteBatchedStatements=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 10
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 2
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      SPRING_JPA_OPEN_IN_VIEW: "false"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PROCPAG_URL: http://procpag:8089
    tmpfs:
      - /tmp:size=128M
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8083/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    logging: *app-logging
    deploy:
      resources:
        limits:
          memory: 512M           # era 768M (cabe JVM com Xmx ~330M + metaspace 160M + threads)
          cpus: "0.75"
        reservations:
          memory: 128M           # era 384M
    networks:
      - fase3net

  restaurante-service:
    build:
      context: .
      dockerfile: restaurante-service/Dockerfile
    image: fiap-fase3/restaurante-service:local
    container_name: restaurante-service
    restart: unless-stopped
    init: true
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      usuario-autenticacao:
        condition: service_healthy
    ports:
      - "8084:8084"
    environment:
      <<: *app-jvm-opts
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cozinha_db?useSSL=false&allowPublicKeyRetrieval=true&cachePrepStmts=true&useServerPrepStmts=true&rewriteBatchedStatements=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 10
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 2
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      SPRING_JPA_OPEN_IN_VIEW: "false"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    tmpfs:
      - /tmp:size=128M
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8084/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    logging: *app-logging
    deploy:
      resources:
        limits:
          memory: 512M           # era 768M (cabe JVM com Xmx ~330M + metaspace 160M + threads)
          cpus: "0.75"
        reservations:
          memory: 128M           # era 384M
    networks:
      - fase3net

volumes:
  mysql_data:
  kafka_data:

networks:
  fase3net:
    name: fase3net
    driver: bridge
