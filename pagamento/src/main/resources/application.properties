spring.application.name=pagamento
server.port=${SERVER_PORT:8083}

# GraphQL
spring.graphql.graphiql.enabled=true
spring.graphql.http.path=/graphql

# OpenAPI / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# JWT — chave pública do serviço usuario-autenticacao para validar tokens
spring.security.oauth2.resourceserver.jwt.public-key-location=classpath:keys/publicKey.pem

# Datasource (MySQL) — defaults para execução local; container sobrescreve via env
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/pagamento_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Kafka
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=pagamento-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=java.util.HashMap
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Tópicos Kafka
pagamento.topics.pedido-criado=pedido.criado
pagamento.topics.pagamento-aprovado=pagamento.aprovado
pagamento.topics.pagamento-pendente=pagamento.pendente

# Processamento de pagamento externo (procpag)
pagamento.gateway.url=${PROCPAG_URL:http://localhost:8089}
pagamento.gateway.path=/requisicao

# Worker de reprocessamento (em milissegundos)
pagamento.reprocess.fixed-delay-ms=30000
pagamento.reprocess.initial-delay-ms=15000
pagamento.reprocess.batch-size=20

# Resilience4j — Circuit Breaker
resilience4j.circuitbreaker.instances.paymentService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.paymentService.sliding-window-size=5
resilience4j.circuitbreaker.instances.paymentService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.paymentService.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.paymentService.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.paymentService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.paymentService.automatic-transition-from-open-to-half-open-enabled=true

# Resilience4j — Retry
resilience4j.retry.instances.paymentService.max-attempts=3
resilience4j.retry.instances.paymentService.wait-duration=2s
resilience4j.retry.instances.paymentService.enable-exponential-backoff=true
resilience4j.retry.instances.paymentService.exponential-backoff-multiplier=2
# Quando o Circuit Breaker já está OPEN, não adianta retentar — fail-fast.
resilience4j.retry.instances.paymentService.ignore-exceptions=io.github.resilience4j.circuitbreaker.CallNotPermittedException

# Resilience4j — TimeLimiter
resilience4j.timelimiter.instances.paymentService.timeout-duration=5s
resilience4j.timelimiter.instances.paymentService.cancel-running-future=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers,retries,scheduledtasks
management.endpoint.health.show-details=always
